---
apiVersion: v2
name: metrics
description: A Kubernetes-native monitoring dashboard with Prometheus metrics and live cluster visibility
type: application
version: "0.1.5"
appVersion: "1.1.6"

dependencies:
  - name: kube-prometheus-stack
    version: "72.x"
    repository: https://prometheus-community.github.io/helm-charts
    alias: monitoring
    condition: monitoring.enabled
  - name: postgresql
    version: "15.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
