services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules.yml:/etc/prometheus/rules.yml:ro
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.enable-lifecycle'

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    privileged: true
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    privileged: true
    ports:
      - "9000:8080"
    command:
      - '--housekeeping_interval=30s'
      - '--docker_only=true'
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg

  backend:
    image: brahmanya/backend-metrics:v1
    container_name: backend-metrics
    networks:
      - default
      - kind
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/local/bin/kind:/usr/local/bin/kind:ro
      - /usr/local/bin/kubectl:/usr/local/bin/kubectl:ro
      - /usr/bin/docker:/usr/bin/docker:ro
      - ~/.kube:/root/.kube
      - ../backend:/app
    env_file:
      - ../backend/.env
    environment:
      - PROMETHEUS_URL=http://prometheus:9090
    ports:
      - "8000:8000"
    depends_on:
      - prometheus
      - postgres

  frontend:
    image: brahmanya/frontend-metrics:v1
    container_name: frontend-metrics
    ports:
      - "3001:3001"
    depends_on:
      - backend

  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      - POSTGRES_USER=metrics_user
      - POSTGRES_PASSWORD=metrics_pass
      - POSTGRES_DB=metrics_db
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:


networks:
  default:
  kind:
    external: true
